<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>决策中心</title>
<style>
  :root{
    --bg:#F6F7F9; --surface:#FFFFFF; --surface2:#F1F5F9; --border:#E2E8F0;
    --text:#0F172A; --text2:#64748B; --accent:#0F766E; --accent2:#115E59;
    --accent-soft:#F0FDFA; --accent-border:#99F6E4; --green:#16A34A;
    --user-bubble:#0F766E; --user-text:#FFFFFF; --shadow:0 1px 3px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.05);
  }
  html.dark{
    --bg:#0B1220; --surface:#131C2E; --surface2:#1B2740; --border:#28354F;
    --text:#E6EBF4; --text2:#8B9BB4; --accent:#2DD4BF; --accent2:#5EEAD4;
    --accent-soft:rgba(45,212,191,.10); --accent-border:rgba(45,212,191,.35); --green:#4ADE80;
    --user-bubble:#0D9488; --user-text:#FFFFFF; --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:14px/1.65 Inter,"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",ui-sans-serif,system-ui,sans-serif;transition:background .25s,color .25s}
  button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
  textarea,input[type=text]{font:inherit;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;width:100%;outline:none;transition:border-color .15s}
  textarea:focus,input[type=text]:focus{border-color:var(--accent)}
  a{color:var(--accent)}
  ::selection{background:var(--accent-soft)}

  header.top{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .top-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:14px 20px}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#0EA5E9);display:grid;place-items:center;color:#fff;font-size:17px;flex:none}
  .brand h1{font-size:17px;line-height:1.3}
  .brand p{font-size:12px;color:var(--text2)}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .pill{font-size:12px;font-weight:600;padding:4px 12px;border-radius:999px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);white-space:nowrap}
  .pill.done{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-border)}
  .dot{width:9px;height:9px;border-radius:50%;background:#CBD5E1;flex:none}
  .dot.ok{background:var(--green);box-shadow:0 0 0 3px color-mix(in srgb,var(--green) 22%,transparent)}
  .dot.bad{background:#F87171}
  .icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface);display:grid;place-items:center;font-size:15px}
  .icon-btn:hover{border-color:var(--accent)}

  main{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:20px;padding:20px;align-items:start}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
  .card h2{font-size:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:700;letter-spacing:.4px;padding:2px 9px;border-radius:6px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-border)}
  .docref{font-size:12px;color:var(--text2);font-weight:400}
  .bg-text{color:var(--text2);font-size:13px;margin:8px 0 14px;white-space:pre-wrap}
  label.opt{display:flex;gap:11px;align-items:flex-start;border:1.5px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:border-color .15s,background .15s}
  label.opt:hover{border-color:var(--accent)}
  label.opt.checked{border-color:var(--accent);background:var(--accent-soft)}
  label.opt input{margin-top:4px;accent-color:var(--accent);flex:none}
  .opt-title{font-weight:600}
  .rec{font-size:11px;font-weight:600;background:var(--accent);color:#fff;border-radius:5px;padding:1px 7px;margin-left:7px;vertical-align:1px}
  .opt-desc{color:var(--text2);font-size:13px;margin-top:2px}
  .custom-input{margin:-3px 0 10px 34px;width:calc(100% - 34px)}
  .notes{margin-top:6px;min-height:38px;resize:vertical;font-size:13px}

  .decided{display:flex;gap:12px;align-items:flex-start;background:var(--surface2);border-radius:11px;padding:13px 15px}
  .decided .mark{color:var(--green);font-size:17px;flex:none}
  .decided .meta{font-size:12px;color:var(--text2);margin-top:3px}
  .ghost{font-size:12px;color:var(--accent);border:1px solid var(--accent-border);border-radius:8px;padding:5px 12px;margin-left:auto;flex:none}
  .ghost:hover{background:var(--accent-soft)}

  .savebar{position:sticky;bottom:14px;z-index:20;display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 18px;box-shadow:var(--shadow)}
  .savebar .info{font-size:13px;color:var(--text2)}
  .save-btn{margin-left:auto;background:var(--accent);color:#fff;font-weight:650;border-radius:10px;padding:9px 22px;transition:opacity .15s}
  .save-btn:hover{background:var(--accent2)}
  .save-btn:disabled{opacity:.45;cursor:not-allowed}

  .empty{padding:46px 20px;text-align:center;color:var(--text2)}
  .empty .spin{font-size:26px;display:inline-block;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.35}}

  aside.chat{position:sticky;top:76px;height:calc(100vh - 96px);min-height:420px;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .chat-head{padding:13px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
  .chat-head .t{font-weight:650;font-size:14px}
  .chat-head .s{font-size:12px;color:var(--text2)}
  #msgs{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:86%;border-radius:13px;padding:9px 13px;font-size:13px;overflow-wrap:break-word}
  .msg.user{align-self:flex-end;background:var(--user-bubble);color:var(--user-text);border-bottom-right-radius:4px}
  .msg.assistant{align-self:flex-start;background:var(--surface2);border-bottom-left-radius:4px}
  .msg.system{align-self:center;background:none;color:var(--text2);font-size:12px;max-width:100%}
  .msg .time{display:block;font-size:10px;opacity:.55;margin-top:4px}
  .msg pre{background:rgba(0,0,0,.18);border-radius:8px;padding:8px 10px;margin:6px 0;overflow-x:auto;font-size:12px}
  html:not(.dark) .msg.assistant pre{background:rgba(15,23,42,.07)}
  .msg code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.92em}
  .msg .md-h{font-weight:700;margin:5px 0 2px}
  .msg .md-gap{height:6px}
  .msg ul{padding-left:19px;margin:3px 0}
  .typing{display:none;align-items:center;gap:8px;padding:0 17px 9px;color:var(--text2);font-size:12px}
  .typing.on{display:flex}
  .typing .b{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.2s infinite}
  .typing .b:nth-child(2){animation-delay:.2s}.typing .b:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
  .chips{display:flex;gap:7px;flex-wrap:wrap;padding:0 15px 10px}
  .chip{font-size:12px;color:var(--text2);border:1px solid var(--border);border-radius:999px;padding:4px 11px}
  .chip:hover{color:var(--accent);border-color:var(--accent)}
  .composer{display:flex;gap:9px;padding:12px 15px;border-top:1px solid var(--border);align-items:flex-end}
  .composer textarea{resize:none;min-height:40px;max-height:130px;line-height:1.5}
  .send{width:40px;height:40px;flex:none;border-radius:10px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:16px}
  .send:hover{background:var(--accent2)}
  .send:disabled{opacity:.45;cursor:not-allowed}

  #toast{position:fixed;left:50%;bottom:30px;transform:translate(-50%,16px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:11px;font-size:13px;opacity:0;pointer-events:none;transition:all .25s;z-index:50;box-shadow:var(--shadow)}
  #toast.show{opacity:1;transform:translate(-50%,0)}

  #chatFab{display:none;position:fixed;right:18px;bottom:18px;z-index:40;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;box-shadow:var(--shadow)}
  #fileWarn{display:none;margin:18px auto;max-width:680px;background:#FEF3C7;color:#92400E;border-radius:12px;padding:14px 18px;font-size:13px}

  @media (max-width:960px){
    main{grid-template-columns:1fr}
    aside.chat{display:none;position:fixed;inset:0;z-index:45;height:auto;border-radius:0;top:0}
    aside.chat.open{display:flex}
    .chat-close{display:block!important}
    #chatFab{display:grid;place-items:center}
  }
  .chat-close{display:none;margin-left:auto}
</style>
</head>
<body>
<header class="top"><div class="top-inner">
  <div class="logo">⚖</div>
  <div class="brand"><h1 id="title">决策中心</h1><p id="subtitle">选择各项决策，保存后由 Claude 自动读取执行</p></div>
  <div class="top-right">
    <span class="pill" id="progress">—</span>
    <span class="dot" id="conn" title="与本地服务的实时连接"></span>
    <button class="icon-btn" id="themeBtn" title="切换主题">🌙</button>
  </div>
</div></header>

<div id="fileWarn">当前以 <code>file://</code> 方式打开，聊天与保存功能不可用。请在终端运行 <code>python3 decide.py</code> 后访问提示的地址。</div>

<main>
  <section id="left">
    <div id="cards"></div>
    <div class="card" id="globalCard" style="display:none">
      <h2 style="font-size:14px">补充说明（可选）</h2>
      <textarea id="globalNote" class="notes" placeholder="对任何条目的额外约束或新要求，会随决策一起写入日志……"></textarea>
    </div>
    <div class="savebar" id="savebar" style="display:none">
      <span class="info" id="saveInfo">尚未选择</span>
      <button class="save-btn" id="saveBtn" disabled>保存决策</button>
    </div>
  </section>

  <aside class="chat" id="chatPanel">
    <div class="chat-head">
      <span style="font-size:16px">💬</span>
      <div><div class="t">与 Claude 对话</div><div class="s">提问、补充背景、要求增删或修改决策项——页面会实时更新</div></div>
      <button class="icon-btn chat-close" id="chatClose">✕</button>
    </div>
    <div id="msgs"></div>
    <div class="typing" id="typing"><span class="b"></span><span class="b"></span><span class="b"></span>Claude 正在处理（由会话中的 Claude 值守应答）…</div>
    <div class="chips" id="chips">
      <button class="chip">解释一下推荐项的理由</button>
      <button class="chip">这些决策之间有依赖关系吗？</button>
      <button class="chip">帮我给某一项增加一个新选项</button>
    </div>
    <div class="composer">
      <textarea id="chatInput" placeholder="向 Claude 提问…（Enter 发送，Shift+Enter 换行）" rows="1"></textarea>
      <button class="send" id="sendBtn" title="发送">➤</button>
    </div>
  </aside>
</main>

<button id="chatFab" title="打开对话">💬</button>
<div id="toast"></div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const state={data:null,chat:[],selections:new Map(),reopened:new Set(),lastSaveAt:0,versions:null};
const isHttp=location.protocol.startsWith("http");

/* ---------- 工具 ---------- */
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function md(src){
  const parts=String(src).replace(/\r\n/g,"\n").split("```");
  return parts.map((b,i)=>{
    if(i%2){const nl=b.indexOf("\n");return "<pre><code>"+esc(nl>=0?b.slice(nl+1):b)+"</code></pre>";}
    return mdInline(b);
  }).join("");
}
function mdInline(t){
  let html="",inList=false;
  for(const line of t.split("\n")){
    let e=esc(line)
      .replace(/`([^`]+)`/g,"<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
      .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    if(/^\s*[-*] /.test(line)){
      if(!inList){html+="<ul>";inList=true;}
      html+="<li>"+e.replace(/^\s*[-*] /,"")+"</li>";
    }else{
      if(inList){html+="</ul>";inList=false;}
      if(/^#{1,3} /.test(line))html+='<div class="md-h">'+e.replace(/^#{1,3} /,"")+"</div>";
      else if(!line.trim())html+='<div class="md-gap"></div>';
      else html+="<div>"+e+"</div>";
    }
  }
  return html+(inList?"</ul>":"");
}
let toastTimer;
function toast(text){
  const el=$("toast");el.textContent=text;el.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("show"),2800);
}

/* ---------- 主题 ---------- */
function applyTheme(){
  const pref=localStorage.getItem("dp-theme");
  const dark=pref?pref==="dark":matchMedia("(prefers-color-scheme: dark)").matches;
  document.documentElement.classList.toggle("dark",dark);
  $("themeBtn").textContent=dark?"☀️":"🌙";
}
$("themeBtn").onclick=()=>{
  localStorage.setItem("dp-theme",document.documentElement.classList.contains("dark")?"light":"dark");
  applyTheme();
};
matchMedia("(prefers-color-scheme: dark)").addEventListener("change",applyTheme);
applyTheme();

/* ---------- 决策卡片 ---------- */
function sel(id){if(!state.selections.has(id))state.selections.set(id,{choice:null,custom:"",notes:""});return state.selections.get(id);}
function renderDecisions(){
  const data=state.data||{decisions:[]};
  const list=data.decisions||[];
  $("title").textContent=data.title?data.title+" · 决策中心":"决策中心";
  document.title=$("title").textContent;
  if(data.subtitle)$("subtitle").textContent=data.subtitle;
  const decided=list.filter(d=>d.status==="decided").length;
  const pg=$("progress");
  pg.textContent=list.length?`${decided}/${list.length} 已拍板`:"等待数据";
  pg.classList.toggle("done",list.length>0&&decided===list.length);

  const cards=$("cards");cards.innerHTML="";
  if(!list.length){
    cards.innerHTML='<div class="card empty"><div class="spin">⏳</div><p style="margin-top:10px">等待 Claude 生成 <code>decisions.json</code>…<br>文件就绪后本页会自动刷新。</p></div>';
    $("savebar").style.display="none";$("globalCard").style.display="none";
    return;
  }
  $("globalCard").style.display="";$("savebar").style.display="flex";
  for(const d of list){
    const card=document.createElement("div");card.className="card";
    const head=`<h2><span class="tag">${esc(d.id)}</span>${esc(d.title)}${d.doc?` <span class="docref">📄 ${esc(d.doc)}</span>`:""}</h2>`+
      (d.background?`<div class="bg-text">${esc(d.background)}</div>`:'<div style="height:10px"></div>');
    if(d.status==="decided"&&!state.reopened.has(d.id)){
      const r=d.result||{};
      card.innerHTML=head+`<div class="decided"><span class="mark">✓</span><div><div><strong>${esc(r.label||"")}</strong></div>`+
        (r.notes?`<div class="meta">备注：${esc(r.notes)}</div>`:"")+
        `<div class="meta">拍板于 ${esc(r.time||"")}</div></div><button class="ghost" data-reopen="${esc(d.id)}">重新选择</button></div>`;
      cards.appendChild(card);continue;
    }
    const s=sel(d.id);
    let html=head;
    for(const o of (d.options||[])){
      const ck=s.choice===o.key;
      html+=`<label class="opt${ck?" checked":""}"><input type="radio" name="${esc(d.id)}" value="${esc(o.key)}"${ck?" checked":""}>`+
        `<span><span class="opt-title">${esc(o.key)}. ${esc(o.label)}</span>${o.recommended?'<span class="rec">推荐</span>':""}`+
        (o.desc?`<div class="opt-desc">${esc(o.desc)}</div>`:"")+`</span></label>`;
    }
    if(d.allowCustom!==false){
      const ck=s.choice==="custom";
      html+=`<label class="opt${ck?" checked":""}"><input type="radio" name="${esc(d.id)}" value="custom"${ck?" checked":""}>`+
        `<span><span class="opt-title">✏️ 自定义</span><div class="opt-desc">以上都不合适？写下你的方案</div></span></label>`+
        `<input type="text" class="custom-input" data-custom="${esc(d.id)}" placeholder="自定义方案…" value="${esc(s.custom)}" style="${ck?"":"display:none"}">`;
    }
    html+=`<textarea class="notes" data-note="${esc(d.id)}" placeholder="该项备注（可选）">${esc(s.notes)}</textarea>`;
    card.innerHTML=html;cards.appendChild(card);
  }
  updateSaveBar();
}
function pendingItems(){
  const out=[];
  for(const d of (state.data?.decisions||[])){
    if(d.status==="decided"&&!state.reopened.has(d.id))continue;
    const s=state.selections.get(d.id);
    if(!s||!s.choice)continue;
    if(s.choice==="custom"){
      if(!s.custom.trim())continue;
      out.push({id:d.id,choice:"custom",label:"自定义："+s.custom.trim(),notes:s.notes});
    }else{
      const o=(d.options||[]).find(x=>x.key===s.choice);
      if(o)out.push({id:d.id,choice:o.key,label:`${o.key}. ${o.label}`,notes:s.notes});
    }
  }
  return out;
}
function updateSaveBar(){
  const n=pendingItems().length;
  $("saveBtn").disabled=n===0||!isHttp;
  $("saveBtn").textContent=n?`保存决策（${n} 项）`:"保存决策";
  $("saveInfo").textContent=n?`已选 ${n} 项待保存 → 写入 decisions-log.md`:"选择后在此保存；Claude 会自动收到通知";
}
document.addEventListener("change",e=>{
  if(e.target.type==="radio"){
    const s=sel(e.target.name);s.choice=e.target.value;renderDecisions();
  }
});
document.addEventListener("input",e=>{
  if(e.target.dataset.custom!==undefined&&e.target.dataset.custom!==""){sel(e.target.dataset.custom).custom=e.target.value;updateSaveBar();}
  if(e.target.dataset.note)sel(e.target.dataset.note).notes=e.target.value;
});
document.addEventListener("click",e=>{
  const id=e.target.dataset?.reopen;
  if(id){
    state.reopened.add(id);
    const d=state.data.decisions.find(x=>x.id===id),s=sel(id);
    if(d?.result){s.choice=d.result.choice;s.notes=d.result.notes||"";if(d.result.choice==="custom")s.custom=(d.result.label||"").replace(/^自定义：/,"");}
    renderDecisions();
  }
});
$("saveBtn").onclick=async()=>{
  const items=pendingItems();
  if(!items.length)return;
  $("saveBtn").disabled=true;
  try{
    const r=await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({items,globalNote:$("globalNote").value})});
    const j=await r.json();
    if(!j.ok)throw new Error(j.error||"保存失败");
    state.lastSaveAt=Date.now();
    for(const it of items){state.selections.delete(it.id);state.reopened.delete(it.id);}
    $("globalNote").value="";
    toast(`✅ 已写入 decisions-log.md（${j.saved} 项），Claude 将自动读取执行`);
    await fetchState();
  }catch(err){toast("保存失败："+err.message);updateSaveBar();}
};

/* ---------- 聊天 ---------- */
function renderChat(){
  const box=$("msgs");
  const nearBottom=box.scrollHeight-box.scrollTop-box.clientHeight<80;
  box.innerHTML="";
  for(const m of state.chat){
    const el=document.createElement("div");
    el.className="msg "+(m.role==="user"?"user":m.role==="assistant"?"assistant":"system");
    el.innerHTML=(m.role==="assistant"?md(m.text):esc(m.text).replace(/\n/g,"<br>"))+
      (m.role!=="system"?`<span class="time">${esc(m.time||"")}</span>`:"");
    box.appendChild(el);
  }
  if(!state.chat.length){
    box.innerHTML='<div class="msg system">还没有对话。有疑问直接问——会话中的 Claude 在值守，也可以让它修改决策内容。</div>';
  }
  $("typing").classList.toggle("on",state.chat.length>0&&state.chat[state.chat.length-1].role==="user");
  $("chips").style.display=state.chat.length?"none":"flex";
  if(nearBottom)box.scrollTop=box.scrollHeight;
}
async function sendChat(){
  const input=$("chatInput"),text=input.value.trim();
  if(!text||!isHttp)return;
  $("sendBtn").disabled=true;
  try{
    const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})});
    const j=await r.json();
    if(!j.ok)throw new Error(j.error||"发送失败");
    input.value="";input.style.height="40px";
    await fetchState();
  }catch(err){toast("发送失败："+err.message);}
  $("sendBtn").disabled=false;input.focus();
}
$("sendBtn").onclick=sendChat;
$("chatInput").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}
});
$("chatInput").addEventListener("input",e=>{
  e.target.style.height="40px";e.target.style.height=Math.min(e.target.scrollHeight,130)+"px";
});
$("chips").addEventListener("click",e=>{
  if(e.target.classList.contains("chip")){$("chatInput").value=e.target.textContent;$("chatInput").focus();}
});
$("chatFab").onclick=()=>$("chatPanel").classList.add("open");
$("chatClose").onclick=()=>$("chatPanel").classList.remove("open");

/* ---------- 数据同步 ---------- */
async function fetchState(){
  if(!isHttp)return;
  const r=await fetch("/api/state");
  const j=await r.json();
  const prevDecisionsV=state.versions?.decisions;
  state.data=j.decisions;state.chat=j.chat;state.versions=j.versions;
  renderDecisions();renderChat();
  return prevDecisionsV;
}
function connectSSE(){
  if(!isHttp)return;
  const es=new EventSource("/api/events");
  es.onopen=()=>{$("conn").className="dot ok";fetchState();};
  es.onerror=()=>{$("conn").className="dot bad";};
  es.onmessage=async ev=>{
    let v;try{v=JSON.parse(ev.data);}catch{return;}
    if(JSON.stringify(v)===JSON.stringify(state.versions))return;
    const decisionsChanged=state.versions&&v.decisions!==state.versions.decisions;
    await fetchState();
    if(decisionsChanged&&Date.now()-state.lastSaveAt>3000)toast("📡 决策内容已由 Claude 更新");
  };
}
if(isHttp){fetchState().then(connectSSE);}
else{$("fileWarn").style.display="block";renderDecisions();renderChat();}
</script>
